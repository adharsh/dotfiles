# Enable mouse support in tmux
# Allows scrolling with the mouse, selecting panes/windows, and resizing panes
set -g mouse on

# Increase the scrollback buffer for each pane
# Default is ~2000 lines; this allows scrolling back through much longer outputs
set -g history-limit 100000

# Use Vim-style keybindings in tmux copy/scroll mode
# Example: j/k to move, / to search, v to begin selection, y to copy
setw -g mode-keys vi

# Reduce delay when tmux interprets escape sequences
# Makes keybindings (especially in vim/neovim) feel more responsive
# Default is ~500ms
set -sg escape-time 0

# Tell applications inside tmux that the terminal supports 256 colors
# Uses the modern tmux terminfo entry instead of screen
set -g default-terminal "tmux-256color"

# Enable truecolor (24-bit color) support for terminals that support it
# Allows modern themes and tools (vim, bat, htop, etc.) to render full colors
set -ga terminal-overrides ",*:Tc"
